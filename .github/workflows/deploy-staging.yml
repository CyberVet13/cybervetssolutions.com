# GitHub Actions Workflow - Deploy to Staging
#
# What does this do?
# Automatically builds and deploys to staging environment when code is pushed.
# Staging = test environment that looks like production.
# 
# This lets you catch issues before real users see them.
# If tests/lint/security pass, deployment happens automatically.

name: Deploy to Staging

on:
  push:
    branches: [develop]  # Only on develop branch
  workflow_run:
    workflows: [Test, Lint, Security]
    types: [completed]
    branches: [develop]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    
    # Only run if test/lint/security workflows passed
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      # Build Docker images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push frontend
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY }}/cybervet-frontend:${{ github.sha }}
          tags: ${{ secrets.DOCKER_REGISTRY }}/cybervet-frontend:staging-latest

      # Build and push backend
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY }}/cybervet-backend:${{ github.sha }}
          tags: ${{ secrets.DOCKER_REGISTRY }}/cybervet-backend:staging-latest

      # Deploy to staging Kubernetes cluster
      - name: Deploy to staging
        run: |
          # Setup kubectl
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 --decode > $HOME/.kube/config
          
          # Deploy using kubectl
          kubectl set image deployment/frontend frontend=${{ secrets.DOCKER_REGISTRY }}/cybervet-frontend:${{ github.sha }} -n staging
          kubectl set image deployment/backend backend=${{ secrets.DOCKER_REGISTRY }}/cybervet-backend:${{ github.sha }} -n staging
          
          # Wait for rollout to complete
          kubectl rollout status deployment/frontend -n staging --timeout=5m
          kubectl rollout status deployment/backend -n staging --timeout=5m

      # Verify deployment health
      - name: Health check staging
        run: |
          sleep 10  # Wait for services to start
          curl -f https://staging.cybervetssolutions.com/health || exit 1
          echo "✅ Staging deployment successful"

      # Notify on Slack (optional)
      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment*\n✅ Success\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
