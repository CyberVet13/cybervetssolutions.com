# Docker Compose — Local Development Stack
# 
# What is this file?
# This file defines all the services needed to run CyberVets locally.
# Services are like mini-computers: PostgreSQL (database), Redis (cache), etc.
#
# How to use:
# - Start all services: docker-compose up -d
# - Stop all services: docker-compose down
# - View logs: docker-compose logs -f
#
# Common issues:
# - Port already in use? Edit the port numbers (3306:5432 means local:container)
# - PostgreSQL won't connect? Wait 10 seconds for it to start
# - Need to rebuild? docker-compose up -d --build

version: '3.8'

services:
  # PostgreSQL Database
  # What: Stores all data (leads, agents, emails, etc.)
  # Why: Reliable, proven, built-in relationships/transactions
  # Credentials: user=cybervet, password=dev_password
  postgres:
    image: postgres:15-alpine
    container_name: cybervet_postgres
    environment:
      POSTGRES_USER: cybervet
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: cybervet_dev
    ports:
      - "5432:5432"  # localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybervet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybervet_network

  # Redis Cache & Session Store
  # What: Fast in-memory store for cache, sessions, job queues
  # Why: Super fast, great for temporary data
  # Default: No password (development only)
  redis:
    image: redis:7-alpine
    container_name: cybervet_redis
    ports:
      - "6379:6379"  # localhost:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybervet_network

  # pgAdmin - PostgreSQL Admin UI (Optional)
  # What: Web interface to view/manage PostgreSQL database
  # How to use:
  #   1. Go to http://localhost:5050
  #   2. Login: admin@admin.com / admin
  #   3. Add server: hostname=postgres, username=cybervet, password=dev_password
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cybervet_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"  # http://localhost:5050
    depends_on:
      - postgres
    networks:
      - cybervet_network

  # Redis Commander - Redis Admin UI (Optional)
  # What: Web interface to view/manage Redis cache
  # How to use: Go to http://localhost:8081
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cybervet_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"  # http://localhost:8081
    depends_on:
      - redis
    networks:
      - cybervet_network

  # ============================================
  # APPLICATION SERVICES (Frontend + Backend)
  # ============================================

  # Backend - Node.js + Express API
  # What: REST API server that powers the app
  # Runs on: http://localhost:3001
  # Built from: backend/Dockerfile
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cybervet_backend
    ports:
      - "3001:3001"  # http://localhost:3001
    environment:
      # Database
      DATABASE_URL: postgresql://cybervet:dev_password@postgres:5432/cybervet_dev
      # Cache
      REDIS_URL: redis://redis:6379/0
      # Server
      NODE_ENV: development
      PORT: 3001
      # URLs
      API_URL: http://localhost:3001
      FRONTEND_URL: http://localhost:3000
      # Secrets (change in production!)
      JWT_SECRET: dev_secret_key_change_in_production
      # Logging
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount source code for hot reload (development only)
      - ./backend/src:/app/backend/src
      - ./backend/database:/app/backend/database
      - /app/node_modules  # Don't mount node_modules
    restart: unless-stopped
    networks:
      - cybervet_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

  # Frontend - React + Nginx
  # What: Web UI for the app
  # Runs on: http://localhost:3000
  # Built from: frontend/Dockerfile
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cybervet_frontend
    ports:
      - "3000:3000"  # http://localhost:3000
    depends_on:
      - backend
    environment:
      # These are build-time variables (passed during docker build)
      VITE_API_URL: http://localhost:3001
      VITE_APP_NAME: CyberVets Solutions
    volumes:
      # Mount frontend source for hot reload (requires Vite dev server, not Nginx)
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - /app/node_modules  # Don't mount node_modules
    restart: unless-stopped
    networks:
      - cybervet_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

# Volumes: Persistent storage so data doesn't disappear when container stops
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Networks: Allow containers to talk to each other
networks:
  cybervet_network:
    driver: bridge

# ENVIRONMENT VARIABLES FOR BACKEND
# Add these to backend/.env:
#
# DATABASE_URL=postgresql://cybervet:dev_password@localhost:5432/cybervet_dev
# REDIS_URL=redis://localhost:6379/0
# NODE_ENV=development
# PORT=3001
# API_URL=http://localhost:3001
# FRONTEND_URL=http://localhost:3000
# JWT_SECRET=dev_secret_key_change_in_production
# LOG_LEVEL=info
